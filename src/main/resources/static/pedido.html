<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Confirmar Pedido - TAKE</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="stylesheet" href="css/pedido.css">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <span>TAKE</span>
    <small>Chifa & Pollería</small>
  </div>

  <nav id="navbarLinks">
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="login.html">Personal</a>
  </nav>
</header>

<main class="contenedor">

  <section class="formulario">
    <h1>Confirmar Pedido</h1>
    <p>Completa tus datos para registrar el pedido delivery.</p>

    <div class="card">
      <h2>Datos del cliente</h2>

      <label>Nombre completo</label>
      <input id="nombre" type="text" placeholder="Ej: Gerson Rojas">

      <label>Teléfono</label>
      <input id="telefono" type="text" placeholder="Ej: 987654321">

      <label>Dirección de entrega</label>
      <input id="direccion" type="text" placeholder="Ej: Av. Lima 123">

      <label>Referencia</label>
      <input id="referencia" type="text" placeholder="Ej: Frente al parque">
    </div>

    <div class="card">
      <h2>Forma de pago</h2>

      <select id="metodoPago" onchange="mostrarCampoPago()">
        <option value="">Seleccione método de pago</option>
        <option value="EFECTIVO">Efectivo</option>
        <option value="YAPE">Yape</option>
        <option value="TARJETA">Tarjeta simulada</option>
      </select>

      <div id="campoCodigoPago" class="campo-pago">
        <label>Código de operación / simulación</label>
        <input id="codigoPago" type="text" placeholder="Ej: 123456">
      </div>
    </div>

    <div class="acciones">
      <a class="btn-secundario" href="menu.html">Volver al menú</a>
      <button class="btn-principal" onclick="confirmarPedido()">Confirmar pedido</button>
    </div>
  </section>

  <aside class="resumen">
    <h2>Resumen del pedido</h2>
    <div id="resumenCarrito"></div>

    <div class="total-box">
      <span>Total</span>
      <strong>S/ <span id="total">0.00</span></strong>
    </div>
  </aside>

</main>
<script src="js/session.js"></script>
<script src="js/pedido.js"></script>
</body>
</html>
